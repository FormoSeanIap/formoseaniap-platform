<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Article detail page." />
  <title>Portfolio | Article</title>
  <script>
    (() => {
      try {
        const preference = localStorage.getItem("theme-preference");
        if (preference === "light" || preference === "dark") {
          document.documentElement.dataset.theme = preference;
        }
      } catch (error) { }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="alternate" type="application/rss+xml" title="Articles RSS (EN)" href="rss.xml" />
  <link rel="alternate" type="application/rss+xml" title="Articles RSS (ZH)" href="zh/rss.xml" />
</head>

<body data-page="articles">
  <header class="site-header">
    <div class="site-shell header-row">
      <a class="brand" href="index.html">
        <strong>Sêng-Gān Ia̍p</strong>
        <span>Platform Engineer / Writer / Creator</span>
      </a>
      <div class="header-actions">
        <nav class="site-nav" aria-label="Main navigation">
          <ul>
            <li><a class="nav-link" data-nav="home" href="index.html">Home</a></li>
            <li><a class="nav-link" data-nav="projects" href="projects.html">Projects</a></li>
            <li><a class="nav-link" data-nav="podcasts" href="podcasts.html">Podcasts</a></li>
            <li><a class="nav-link" data-nav="articles" href="articles.html">Articles</a></li>
            <li><a class="nav-link" data-nav="about" href="about.html">About</a></li>
            <li><a class="nav-link" href="/engineer/">Engineering</a></li>
          </ul>
        </nav>
        <div class="theme-switcher" role="group" aria-label="Color theme">
          <span class="theme-switch-label">Theme</span>
          <div class="theme-switch-options">
            <button class="theme-option" type="button" data-theme-option="system" aria-pressed="false">Auto</button>
            <button class="theme-option" type="button" data-theme-option="light" aria-pressed="false">Light</button>
            <button class="theme-option" type="button" data-theme-option="dark" aria-pressed="false">Dark</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="site-shell" data-article-detail>
    <section class="section">
      <div class="hero-copy article-top-anchor" id="article-top" data-reveal>
        <p class="kicker" id="article-kicker">Article</p>
        <h1 id="article-title">Loading article...</h1>
        <p class="lead" id="article-excerpt"></p>
        <p class="meta" id="article-meta"></p>
        <div class="article-filter-row" id="article-links"></div>
      </div>
    </section>

    <section class="section">
      <article class="card" data-reveal data-delay="60">
        <div class="article-content" id="article-body"></div>
        <div class="tag-list" id="article-tags"></div>
      </article>
      <div class="article-filter-row article-end-actions" id="article-end-links"></div>
    </section>
  </main>

  <footer class="site-shell footer">
    <p>Copyright <span data-year></span> Sêng-Gān Ia̍p</p>
    <p>New writing will be published incrementally.</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/articles.js"></script>
  <script src="assets/js/analytics.js"></script>
</body>

</html>
