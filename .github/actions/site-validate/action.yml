name: Site Validate
description: Run site tests, generated artifact checks, and optional site artifact upload.

inputs:
  upload_site_artifact:
    description: Upload the built site directory as a workflow artifact.
    required: false
    default: "false"
  site_artifact_name:
    description: Artifact name used when upload_site_artifact is true.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install test dependencies
      shell: bash
      run: pip install boto3

    - name: Run unit tests
      shell: bash
      run: python3 -m unittest discover -s tests -p 'test_*.py'

    - name: Build generated site artifacts
      shell: bash
      run: python3 scripts/build_articles.py

    - name: Ensure generated outputs are committed
      shell: bash
      run: |
        git diff --stat -- site/data site/assets/articles site/rss.xml site/zh/rss.xml
        git diff --exit-code -- site/data site/assets/articles site/rss.xml site/zh/rss.xml

    - name: Upload site artifact
      if: ${{ inputs.upload_site_artifact == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.site_artifact_name }}
        path: site/
        if-no-files-found: error
