version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Etc/UTC
    groups:
      terraform:
        patterns:
          - "*"
    labels:
      - dependencies
      - terraform
    commit-message:
      prefix: "chore(terraform)"
