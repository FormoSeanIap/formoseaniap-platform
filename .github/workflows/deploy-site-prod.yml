name: Deploy Site Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-site-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Build generated site artifacts
        run: python3 scripts/build_articles.py

      - name: Ensure generated outputs are committed
        run: |
          git diff --stat -- site/data site/assets/articles site/rss.xml site/zh/rss.xml
          git diff --exit-code -- site/data site/assets/articles site/rss.xml site/zh/rss.xml

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-prod-${{ github.run_id }}
          path: site/
          if-no-files-found: error

      - name: Note deployment status
        if: ${{ github.ref != 'refs/heads/main' || vars.AWS_REGION == '' || vars.AWS_PROD_ROLE_ARN == '' || vars.AWS_TERRAFORM_PLAN_ROLE_ARN == '' }}
        run: |
          echo "Production deploy skipped." >> "$GITHUB_STEP_SUMMARY"
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "- Production deploys only run from main." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Set AWS_REGION, AWS_PROD_ROLE_ARN, and AWS_TERRAFORM_PLAN_ROLE_ARN repo variables to enable production deploys." >> "$GITHUB_STEP_SUMMARY"
          fi

  infra_outputs:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && vars.AWS_REGION != '' && vars.AWS_TERRAFORM_PLAN_ROLE_ARN != '' }}
    outputs:
      cloudfront_distribution_id: ${{ steps.tf_outputs.outputs.cloudfront_distribution_id }}
      site_bucket_name: ${{ steps.tf_outputs.outputs.site_bucket_name }}
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          role-session-name: gha-terraform-output-prod-${{ github.run_id }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Read Terraform outputs
        id: tf_outputs
        run: |
          set -euo pipefail

          site_bucket_name="$(terraform output -raw site_bucket_name)"
          cloudfront_distribution_id="$(terraform output -raw cloudfront_distribution_id)"

          echo "site_bucket_name=${site_bucket_name}" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=${cloudfront_distribution_id}" >> "$GITHUB_OUTPUT"
          echo "- Production S3 bucket: \`${site_bucket_name}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production CloudFront distribution: \`${cloudfront_distribution_id}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy_prod:
    needs:
      - build_site
      - infra_outputs
    if: ${{ github.ref == 'refs/heads/main' && vars.AWS_REGION != '' && vars.AWS_PROD_ROLE_ARN != '' && needs.infra_outputs.outputs.site_bucket_name != '' }}
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: site-prod-${{ github.run_id }}
          path: prod-site

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_PROD_ROLE_ARN }}
          role-session-name: gha-site-prod-${{ github.run_id }}

      - name: Sync site to S3
        run: aws s3 sync prod-site/ "s3://${{ needs.infra_outputs.outputs.site_bucket_name }}/" --delete

      - name: Invalidate production CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ needs.infra_outputs.outputs.cloudfront_distribution_id }}" --paths "/*"
