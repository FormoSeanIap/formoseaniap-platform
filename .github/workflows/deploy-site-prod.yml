name: Deploy Site Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-site-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Build generated site artifacts
        run: python3 scripts/build_articles.py

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-prod-${{ github.run_id }}
          path: site/
          if-no-files-found: error

      - name: Note deployment status
        if: ${{ github.ref != 'refs/heads/main' || vars.AWS_REGION == '' || vars.AWS_PROD_ROLE_ARN == '' || vars.PROD_S3_BUCKET == '' }}
        run: |
          echo "Production deploy skipped." >> "$GITHUB_STEP_SUMMARY"
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "- Production deploys only run from main." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Set AWS_REGION, AWS_PROD_ROLE_ARN, and PROD_S3_BUCKET repo variables to enable production deploys." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy_prod:
    needs: build_site
    if: ${{ github.ref == 'refs/heads/main' && vars.AWS_REGION != '' && vars.AWS_PROD_ROLE_ARN != '' && vars.PROD_S3_BUCKET != '' }}
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: site-prod-${{ github.run_id }}
          path: prod-site

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_PROD_ROLE_ARN }}
          role-session-name: gha-site-prod-${{ github.run_id }}

      - name: Sync site to S3
        run: aws s3 sync prod-site/ "s3://${{ vars.PROD_S3_BUCKET }}/" --delete

      - name: Invalidate production CloudFront cache
        if: ${{ vars.PROD_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.PROD_CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
