name: Version Audit

on:
  workflow_dispatch:
    inputs:
      network:
        description: Fetch latest upstream versions in addition to offline repo checks
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Run version audit
        env:
          ENABLE_NETWORK: ${{ github.event_name == 'schedule' || inputs.network }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          args=(
            --summary-out "$GITHUB_STEP_SUMMARY"
            --json-out "version-audit.json"
          )

          if [ "${ENABLE_NETWORK}" = "true" ]; then
            args+=(--network)
          fi

          python3 scripts/audit_versions.py "${args[@]}"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v6
        with:
          name: version-audit-${{ github.run_id }}
          path: version-audit.json
          if-no-files-found: error
