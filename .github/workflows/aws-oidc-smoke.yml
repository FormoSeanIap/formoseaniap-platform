name: AWS OIDC Smoke Test

on:
  workflow_dispatch:
    inputs:
      aws_role_arn:
        description: IAM role ARN to assume with GitHub OIDC
        required: true
        type: string
      aws_region:
        description: AWS region for the smoke test
        required: true
        default: ap-east-2
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  sts:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_arn }}
          role-session-name: gha-oidc-smoke-${{ github.run_id }}

      - name: Confirm caller identity
        run: aws sts get-caller-identity
