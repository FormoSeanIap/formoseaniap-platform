name: Develop Push Validate

on:
  push:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: develop-push-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  develop_push_validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Build generated site artifacts
        run: python3 scripts/build_articles.py

      - name: Ensure generated outputs are committed
        run: |
          git diff --stat -- site/data site/assets/articles site/rss.xml site/zh/rss.xml
          git diff --exit-code -- site/data site/assets/articles site/rss.xml site/zh/rss.xml
