name: Terraform Validate Develop

on:
  push:
    branches:
      - develop
    paths:
      - "infra/**"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/.terraform.lock.hcl"

permissions:
  contents: read

concurrency:
  group: terraform-validate-develop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enforce_infra_home:
    runs-on: ubuntu-latest
    outputs:
      has_tf: ${{ steps.detect.outputs.has_tf }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure Terraform files live under infra/
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-tree -r --name-only "$after_sha" | grep -E '(^|/).*\.tf$|(^|/).*\.tfvars$|(^|/)\.terraform\.lock\.hcl$' || true)"
          else
            changed_files="$(git diff --name-only "$before_sha" "$after_sha" | grep -E '(^|/).*\.tf$|(^|/).*\.tfvars$|(^|/)\.terraform\.lock\.hcl$' || true)"
          fi

          if [ -z "$changed_files" ]; then
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          outside_infra="$(printf '%s\n' "$changed_files" | grep -Ev '^infra/' || true)"
          if [ -n "$outside_infra" ]; then
            echo "Terraform files must live under infra/." >&2
            printf '%s\n' "$outside_infra" >&2
            exit 1
          fi

          if find infra -type f -name '*.tf' -print -quit | grep -q .; then
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
            echo "No Terraform root files exist under infra/ yet." >> "$GITHUB_STEP_SUMMARY"
          fi

  terraform_validate:
    needs: enforce_infra_home
    if: ${{ needs.enforce_infra_home.outputs.has_tf == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init for validate
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color
