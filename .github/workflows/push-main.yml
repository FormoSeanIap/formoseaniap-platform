name: Push Main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-site-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run shared site validation
        uses: ./.github/actions/site-validate
        with:
          upload_site_artifact: "true"
          site_artifact_name: site-prod-${{ github.run_id }}

  terraform_validate:
    uses: ./.github/workflows/_terraform-validate-shared.yml
    with:
      compare_base_sha: ${{ github.event.before }}
      compare_head_sha: ${{ github.sha }}

  terraform_plan:
    needs:
      - validate
      - terraform_validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run shared Terraform plan
        if: ${{ needs.terraform_validate.outputs.has_tf_root == 'true' && vars.TF_VAR_ANALYTICS_ALARM_EMAIL != '' }}
        uses: ./.github/actions/terraform-plan
        with:
          aws_region: ${{ vars.AWS_REGION }}
          backend_bucket: ${{ vars.TERRAFORM_BACKEND_BUCKET }}
          role_arn: ${{ vars.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          role_session_name: gha-terraform-plan-main-${{ github.run_id }}
          emit_unconfigured_summary: "true"
          summary_message: Set AWS_REGION, AWS_TERRAFORM_PLAN_ROLE_ARN, and TERRAFORM_BACKEND_BUCKET repo variables to enable pre-promotion Terraform plan artifacts on main pushes.
          upload_plan_artifact: "true"
          plan_artifact_name: terraform-plan-main-${{ github.run_id }}
        env:
          TF_VAR_analytics_alarm_email: ${{ vars.TF_VAR_ANALYTICS_ALARM_EMAIL }}

      - name: Note production promotion status when Terraform root is missing
        if: ${{ needs.terraform_validate.outputs.has_tf_root != 'true' }}
        run: echo "Production promotion skipped because no Terraform root exists under infra/." >> "$GITHUB_STEP_SUMMARY"

      - name: Note Terraform plan status when analytics alarm email is not configured
        if: ${{ needs.terraform_validate.outputs.has_tf_root == 'true' && vars.TF_VAR_ANALYTICS_ALARM_EMAIL == '' }}
        run: echo "Set TF_VAR_ANALYTICS_ALARM_EMAIL repo variable to enable Terraform plan artifacts for analytics Lambda monitoring changes." >> "$GITHUB_STEP_SUMMARY"

      - name: Note production promotion status when deploy credentials are not configured
        if: ${{ needs.terraform_validate.outputs.has_tf_root == 'true' && (vars.AWS_REGION == '' || vars.TERRAFORM_BACKEND_BUCKET == '' || vars.AWS_TERRAFORM_APPLY_ROLE_ARN == '' || vars.AWS_PROD_ROLE_ARN == '' || vars.TF_VAR_ANALYTICS_ALARM_EMAIL == '') }}
        run: echo "Set AWS_REGION, TERRAFORM_BACKEND_BUCKET, AWS_TERRAFORM_APPLY_ROLE_ARN, AWS_PROD_ROLE_ARN, and TF_VAR_ANALYTICS_ALARM_EMAIL repo variables to enable production promotion from main." >> "$GITHUB_STEP_SUMMARY"

  promote_prod:
    needs:
      - validate
      - terraform_validate
      - terraform_plan
    if: ${{ needs.terraform_validate.outputs.has_tf_root == 'true' && vars.AWS_REGION != '' && vars.TERRAFORM_BACKEND_BUCKET != '' && vars.AWS_TERRAFORM_APPLY_ROLE_ARN != '' && vars.AWS_PROD_ROLE_ARN != '' && vars.TF_VAR_ANALYTICS_ALARM_EMAIL != '' }}
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        shell: bash
    env:
      TF_VAR_analytics_alarm_email: ${{ vars.TF_VAR_ANALYTICS_ALARM_EMAIL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download production artifact
        uses: actions/download-artifact@v8
        with:
          name: site-prod-${{ github.run_id }}
          path: prod-artifact

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure Terraform apply credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_TERRAFORM_APPLY_ROLE_ARN }}
          role-session-name: gha-terraform-apply-main-${{ github.run_id }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config="bucket=${{ vars.TERRAFORM_BACKEND_BUCKET }}"

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -input=false -auto-approve tfplan

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: infra
        run: |
          set -euo pipefail

          terraform output -json > tf_outputs.json

          site_bucket_name="$(jq -r '.site_bucket_name.value // empty' tf_outputs.json)"
          cloudfront_distribution_id="$(jq -r '.cloudfront_distribution_id.value // empty' tf_outputs.json)"
          analytics_runtime_config="$(jq -c '.analytics_runtime_config.value // empty' tf_outputs.json)"
          engineering_site_bucket_name="$(jq -r '.engineering_site_bucket_name.value // empty' tf_outputs.json)"

          if [ -z "${site_bucket_name}" ] || [ -z "${cloudfront_distribution_id}" ] || [ -z "${analytics_runtime_config}" ] || [ -z "${engineering_site_bucket_name}" ]; then
            echo "Terraform state is missing required outputs: site_bucket_name, cloudfront_distribution_id, analytics_runtime_config, and engineering_site_bucket_name." >&2
            echo "Confirm that the production state in infra/backend.tf is correct and that the main pipeline can apply the Terraform stack successfully." >&2
            exit 1
          fi

          echo "site_bucket_name=${site_bucket_name}" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=${cloudfront_distribution_id}" >> "$GITHUB_OUTPUT"
          echo "analytics_runtime_config=${analytics_runtime_config}" >> "$GITHUB_OUTPUT"
          echo "engineering_site_bucket_name=${engineering_site_bucket_name}" >> "$GITHUB_OUTPUT"
          echo "- Production S3 bucket: \`${site_bucket_name}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Engineering S3 bucket: \`${engineering_site_bucket_name}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production CloudFront distribution: \`${cloudfront_distribution_id}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure production deploy credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_PROD_ROLE_ARN }}
          role-session-name: gha-site-prod-${{ github.run_id }}

      - name: Write analytics runtime config
        run: |
          set -euo pipefail
          mkdir -p prod-artifact/site/data
          printf '%s\n' '${{ steps.tf_outputs.outputs.analytics_runtime_config }}' | jq '.' > prod-artifact/site/data/analytics.config.json
          mkdir -p prod-artifact/site-eng/data
          printf '%s\n' '${{ steps.tf_outputs.outputs.analytics_runtime_config }}' | jq '.' > prod-artifact/site-eng/data/analytics.config.json

      - name: Sync site to S3
        run: aws s3 sync prod-artifact/site/ "s3://${{ steps.tf_outputs.outputs.site_bucket_name }}/" --delete

      - name: Sync engineering site to S3 under /engineer prefix
        run: aws s3 sync prod-artifact/site-eng/ "s3://${{ steps.tf_outputs.outputs.engineering_site_bucket_name }}/engineer/" --delete

      - name: Invalidate production CloudFront cache
        id: cloudfront_invalidation
        run: |
          set -euo pipefail

          invalidation_id="$(
            aws cloudfront create-invalidation \
              --distribution-id "${{ steps.tf_outputs.outputs.cloudfront_distribution_id }}" \
              --paths "/*" \
              --query 'Invalidation.Id' \
              --output text
          )"

          echo "invalidation_id=${invalidation_id}" >> "$GITHUB_OUTPUT"
          echo "- CloudFront invalidation requested: \`${invalidation_id}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for production CloudFront invalidation
        run: |
          set -euo pipefail

          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ steps.tf_outputs.outputs.cloudfront_distribution_id }}" \
            --id "${{ steps.cloudfront_invalidation.outputs.invalidation_id }}"

          echo "- CloudFront invalidation completed: \`${{ steps.cloudfront_invalidation.outputs.invalidation_id }}\`" >> "$GITHUB_STEP_SUMMARY"
