name: PR Validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Build generated site artifacts
        run: python3 scripts/build_articles.py

      - name: Ensure generated outputs are committed
        run: |
          git diff --stat -- site/data site/assets/articles site/rss.xml site/zh/rss.xml
          git diff --exit-code -- site/data site/assets/articles site/rss.xml site/zh/rss.xml
