name: Terraform Apply Prod

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Require main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Run Terraform Apply Prod from main only." >&2
            exit 1
          fi

      - name: Confirm Terraform root exists
        run: |
          if ! find . -type f -name '*.tf' -print -quit | grep -q .; then
            echo "No Terraform configuration exists under infra/ yet." >&2
            exit 1
          fi

      - name: Require production apply variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_ARN: ${{ vars.AWS_TERRAFORM_APPLY_ROLE_ARN }}
        run: |
          if [ -z "$AWS_REGION" ] || [ -z "$AWS_ROLE_ARN" ]; then
            echo "Set AWS_REGION and AWS_TERRAFORM_APPLY_ROLE_ARN repo variables before running production apply." >&2
            exit 1
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_TERRAFORM_APPLY_ROLE_ARN }}
          role-session-name: gha-terraform-apply-prod-${{ github.run_id }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
